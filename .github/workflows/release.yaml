name: Publish Release
on:
  push:
    branches:
      - "main"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed so git log can find the last commit date per file

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build PDFs
        run: python compile.py

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/**/*.pdf
            donnees/**/*.sqlite
          tag_name: latest
          name: "Latest"
          body: |
            ### Rolling Release
            This release is automatically updated on every successful build.

            **Last Update:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
          generate_release_notes: false
          draft: false
          prerelease: false
          make_latest: true # Ensures the "Latest" badge stays here
